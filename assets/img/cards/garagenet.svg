<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191919"/>
      <stop offset="1" stop-color="#2c2c2c"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a66"/>
      <stop offset="1" stop-color="#13294a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- connection links (hub <-> robots) -->
  <g stroke="#5f5f5f" stroke-width="3" stroke-dasharray="2 12" stroke-linecap="round">
    <line x1="640" y1="360" x2="350" y2="205"/>
    <line x1="640" y1="360" x2="350" y2="515"/>
    <line x1="640" y1="360" x2="958" y2="360"/>
  </g>
  <g fill="#3a8bff">
    <circle cx="478" cy="282" r="5"/>
    <circle cx="478" cy="438" r="5"/>
    <circle cx="800" cy="360" r="5"/>
  </g>

  <!-- robot node: drone (quadcopter) -->
  <g transform="translate(350,205)">
    <circle r="92" fill="#202020" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="0" y1="0" x2="-38" y2="-30"/>
      <line x1="0" y1="0" x2="38" y2="-30"/>
      <line x1="0" y1="0" x2="-38" y2="30"/>
      <line x1="0" y1="0" x2="38" y2="30"/>
      <circle cx="-38" cy="-30" r="14"/>
      <circle cx="38" cy="-30" r="14"/>
      <circle cx="-38" cy="30" r="14"/>
      <circle cx="38" cy="30" r="14"/>
    </g>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
  </g>

  <!-- robot node: mobile ground robot -->
  <g transform="translate(350,515)">
    <circle r="92" fill="#202020" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-42" y="-16" width="84" height="40" rx="9"/>
      <circle cx="-24" cy="32" r="12"/>
      <circle cx="24" cy="32" r="12"/>
      <line x1="0" y1="-16" x2="0" y2="-38"/>
    </g>
    <circle cx="0" cy="-42" r="7" fill="#ffffff"/>
  </g>

  <!-- robot node: manipulator arm -->
  <g transform="translate(958,360)">
    <circle r="92" fill="#202020" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-28" y="34" width="56" height="14" rx="4"/>
      <line x1="0" y1="34" x2="-18" y2="-8"/>
      <line x1="-18" y1="-8" x2="24" y2="-34"/>
      <path d="M24 -34 l16 -6"/>
      <path d="M24 -34 l6 -16"/>
    </g>
  </g>

  <!-- central hub: LLM / chat interface -->
  <g transform="translate(640,360)">
    <rect x="-88" y="-64" width="176" height="128" rx="22" fill="url(#hub)" stroke="#3a8bff" stroke-width="3"/>
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-46 -30 H46 a12 12 0 0 1 12 12 V14 a12 12 0 0 1 -12 12 H-6 l-22 20 v-20 H-46 a12 12 0 0 1 -12 -12 V-18 a12 12 0 0 1 12 -12 Z"/>
    </g>
    <g fill="#ffffff">
      <circle cx="-20" cy="-2" r="4.5"/>
      <circle cx="0" cy="-2" r="4.5"/>
      <circle cx="20" cy="-2" r="4.5"/>
    </g>
  </g>
</svg>
